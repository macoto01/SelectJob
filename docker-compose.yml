services:
  # Webサーバー (Nginx)
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # PHP実行環境
  app:
    build: 
      context: .
      dockerfile: .docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
      # ここで config/database.php が読み込む環境変数を定義
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=SelectJob
      - DB_USER=root
      - DB_PASS=${DB_PASS}
    working_dir: /var/www/html

  # データベース (MySQL)
  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    platform: linux/amd64 # Mac M1/M2チップ等での動作を安定させるため
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      - MYSQL_DATABASE=SelectJob
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d  # schema.sqlを自動実行
  phpmyadmin:
      image: phpmyadmin
      container_name: SelectJob_phpmyadmin
      restart: always
      depends_on:
        - db
      environment:
        - PMA_ARBITRARY=1 # 任意のサーバーに接続できるようにする設定
        - PMA_HOST=db       # docker内のサービス名「db」を指定
        - PMA_USER=root
        - PMA_PASSWORD=${DB_PASS}
      ports:
        - "8070:80" # ブラウザで http://localhost:8070 でアクセス可能に
volumes:
  mysql_data: